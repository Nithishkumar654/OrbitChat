<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- OrbitLogo paths scaled from 20x20 viewBox to 512x512 (scale=25.6, offset=0) -->
  <!-- Orbit ring -->
  <ellipse
    cx="256" cy="256"
    rx="199.68" ry="92.16"
    stroke="white" stroke-width="32" fill="none" opacity="0.78"
    transform="rotate(-30 256 256)"
  />

  <!-- Central hub -->
  <circle cx="256" cy="256" r="56.32" fill="white"/>

  <!-- Satellite / chat node -->
  <circle cx="343.04" cy="138.24" r="48.64" fill="white" opacity="0.95"/>

  <!-- Trailing dot -->
  <circle cx="417.28" cy="207.36" r="21.76" fill="white" opacity="0.45"/>
</svg>
